name: Prepare Daily Queue

on:
  workflow_dispatch:
  schedule:
    - cron: "55 5 * * *"

permissions:
  contents: write

concurrency:
  group: prepare-daily-queue
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      TZ: "Europe/Moscow"
      MAX_MOVIE_POSTS_PER_DAY: "3"
      MAX_TV_POSTS_PER_DAY: "3"
      MOVIE_DEDUPE_DAYS: "120"
      TV_DEDUPE_DAYS: "60"
      MIN_TMDB_USER_SCORE_PERCENT: "65"
      PUBLISH_SLOTS: "09:15,12:20,15:15,17:20,19:15,21:20"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests

      - name: Prepare queue
        env:
          TMDB_API_TOKEN: ${{ secrets.TMDB_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m release_pipeline prepare-queue

      - name: Commit updated queue
        run: |
          if git diff --quiet -- "state/publish_queue.json"; then
            echo "No queue changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "state/publish_queue.json"
          git commit -m "Update daily publish queue"
          git push
